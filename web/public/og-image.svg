<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barWarn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e1e2e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
  </g>

  <!-- Glow behind bars -->
  <ellipse cx="780" cy="420" rx="350" ry="180" fill="url(#glowGrad)"/>

  <!-- Profile bar chart visualization -->
  <g transform="translate(520, 150)">
    <!-- Bars (styled like a hotspot chart) -->
    <rect x="0"   y="20"  width="48" height="280" rx="4" fill="url(#barWarn)" opacity="0.9"/>
    <rect x="64"  y="80"  width="48" height="220" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="128" y="120" width="48" height="180" rx="4" fill="url(#barGrad)" opacity="0.85"/>
    <rect x="192" y="155" width="48" height="145" rx="4" fill="url(#barGrad)" opacity="0.8"/>
    <rect x="256" y="185" width="48" height="115" rx="4" fill="url(#barGrad)" opacity="0.75"/>
    <rect x="320" y="210" width="48" height="90"  rx="4" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="384" y="235" width="48" height="65"  rx="4" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="448" y="255" width="48" height="45"  rx="4" fill="url(#barGrad)" opacity="0.5"/>
    <rect x="512" y="270" width="48" height="30"  rx="4" fill="url(#barGrad)" opacity="0.4"/>
    <rect x="576" y="280" width="48" height="20"  rx="4" fill="url(#barGrad)" opacity="0.3"/>

    <!-- Baseline -->
    <line x1="-10" y1="300" x2="634" y2="300" stroke="#1e1e2e" stroke-width="2"/>

    <!-- Magnifying glass / analysis icon over the hotspot bar -->
    <circle cx="24" cy="10" r="28" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.6"/>
    <line x1="44" y1="30" x2="60" y2="46" stroke="#ef4444" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Title text -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#e2e2e8">AL Profile</text>
  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#e2e2e8">Analyzer</text>

  <!-- Tagline -->
  <text x="80" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8888a0">Find performance hotspots in</text>
  <text x="80" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8888a0">Business Central AL code</text>

  <!-- Accent line under title -->
  <rect x="80" y="310" width="120" height="3" rx="1.5" fill="#06b6d4"/>

  <!-- Severity badges -->
  <g transform="translate(80, 420)">
    <rect width="90" height="30" rx="4" fill="rgba(239,68,68,0.15)"/>
    <text x="45" y="20" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#ef4444">Critical</text>

    <rect x="100" width="90" height="30" rx="4" fill="rgba(245,158,11,0.15)"/>
    <text x="145" y="20" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Warning</text>

    <rect x="200" width="65" height="30" rx="4" fill="rgba(59,130,246,0.15)"/>
    <text x="232" y="20" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">Info</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#barGrad)"/>
</svg>
